name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses 2>&1 || true

      - name: Get dependencies
        run: flutter pub get 2>&1

      - name: Analyze
        run: flutter analyze 2>&1 || true

      - name: Build APK (debug with retry)
        id: build_apk
        continue-on-error: true
        run: |
          echo "=== Attempt 1 ==="
          flutter build apk --debug 2>&1 && exit 0
          echo "=== Attempt 1 failed. Retrying... ==="
          flutter clean 2>&1
          flutter pub get 2>&1
          echo "=== Attempt 2 ==="
          flutter build apk --debug 2>&1 || true

      - name: Upload Debug APK
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app.apk
          retention-days: 90

      - name: Build APK (release)
        continue-on-error: true
        run: flutter build apk --release 2>&1 || true

      - name: Upload Release APK
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app.apk
          retention-days: 90

  create_release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build_android
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ github.run_id }}
          name: Build ${{ github.run_id }}
          body: |
            Automated build from main branch.
          files: artifacts/**/*
          fail_on_unmatched_files: false

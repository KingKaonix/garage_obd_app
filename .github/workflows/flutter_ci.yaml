name: Flutter CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - run: yes | flutter doctor --android-licenses || true

      - run: |
          flutter pub get
          flutter build apk --debug

      - name: Collect info
        run: |
          mkdir -p /tmp/info
          find / -name "*.apk" -type f 2>/dev/null > /tmp/info/apk-locations.txt
          ls -laR build/ 2>/dev/null > /tmp/info/build-tree.txt
          wc -l /tmp/info/apk-locations.txt || true

      - name: Upload info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: /tmp/info/
          retention-days: 90

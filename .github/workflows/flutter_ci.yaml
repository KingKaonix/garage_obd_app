name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch: # Allows manual trigger

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter

      - name: Set up Android SDK paths
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH


        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # Use a specific Flutter version, e.g., 3.22.2 or 3.x for latest stable
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Accept Android SDK licenses and install tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "cmdline-tools;latest" "platforms;android-34"

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Build Android AppBundle
        run: flutter build appbundle --release

      - name: Upload Android AppBundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  create_release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build_android # Only create release if Android build succeeds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }} # or use a custom versioning scheme
          name: Release v${{ github.run_number }}
          body: |
            ## Automated Release v${{ github.run_number }}

            This is an automated release generated from the CI/CD pipeline.

            **Changes:**
            - Latest code from main branch.
          files: |
            artifacts/app-release-apk/app-release.apk
            artifacts/app-release-aab/app-release.aab

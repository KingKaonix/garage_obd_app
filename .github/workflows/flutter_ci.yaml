name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses 2>&1 || true

      - name: Get dependencies
        run: flutter pub get 2>&1

      - name: Analyze
        run: flutter analyze 2>&1 || true

      - name: Build APK (debug)
        id: build_apk
        continue-on-error: true
        run: |
          flutter build apk --debug 2>&1 || (flutter clean && flutter pub get && flutter build apk --debug 2>&1 || true)

      - name: Build APK (release)
        continue-on-error: true
        run: |
          flutter build apk --release 2>&1 || true

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          if [ -f build/app/outputs/flutter-apk/app-debug.apk ]; then
            cp build/app/outputs/flutter-apk/app-debug.apk artifacts/garage-obd-debug.apk
          fi
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-release.apk artifacts/garage-obd-release.apk
          fi
          if [ -f build/app/outputs/flutter-apk/app.apk ]; then
            cp build/app/outputs/flutter-apk/app.apk artifacts/garage-obd.apk
          fi
          echo "=== Artifacts ==="
          ls -la artifacts/ 2>/dev/null || echo "No artifacts found"

      - name: Upload APKs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: garage-obd-apks
          path: artifacts/
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          name: Build ${{ github.run_id }}
          tag: build-${{ github.run_id }}
          artifacts: artifacts/*
          artifactContentType: application/vnd.android.package-archive
          replacesArtifacts: true
          body: |
            ## Garage OBD App - Build ${{ github.run_id }}

            Automated build from main branch.

            **APK Downloads:**
            - garage-obd-debug.apk - Debug build (unoptimized, more logging)
            - garage-obd-release.apk - Release build (optimized, signed)
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true

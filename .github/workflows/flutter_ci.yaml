name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses 2>&1 || true

      - name: Doctor
        run: flutter doctor -v 2>&1

      - name: Get dependencies
        run: flutter pub get 2>&1

      - name: Build debug APK with verbose log
        run: |
          flutter build apk --debug 2>&1 | tee /tmp/build.log
        shell: bash

      - name: Upload verbose build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log

      - name: Build release APK
        continue-on-error: true
        run: flutter build apk --release 2>&1 || true

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: garage-obd-apk
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Create Release
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          name: Build ${{ github.run_id }}
          tag: build-${{ github.run_id }}
          artifacts: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          artifactContentType: application/vnd.android.package-archive
          omitBodyDuringUpdate: true
          body: |
            ## Garage OBD App - Build ${{ github.run_id }}
            Automated build from `main` branch.
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          skipIfReleaseExists: false

name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses 2>&1 || true

      - name: Get dependencies
        run: flutter pub get 2>&1

      - name: Analyze
        run: flutter analyze 2>&1 || true

      - name: Build APK (debug with retry)
        id: build_apk
        continue-on-error: true
        run: |
          echo "=== Attempt 1 ==="
          flutter build apk --debug --verbose 2>&1
          if [ $? -ne 0 ]; then
            echo ""
            echo "=== Attempt 1 failed. Cleaning and retrying... ==="
            flutter clean 2>&1
            flutter pub get 2>&1
            echo ""
            echo "=== Attempt 2 ==="
            flutter build apk --debug --verbose 2>&1
          fi

      - name: Upload Debug APK
        if: hashFiles('build/app/outputs/flutter-apk/app-debug.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90

      - name: Build APK (release)
        if: hashFiles('build/app/outputs/flutter-apk/app-debug.apk') != ''
        continue-on-error: true
        run: flutter build apk --release 2>&1

      - name: Upload Release APK
        if: hashFiles('build/app/outputs/flutter-apk/app-release.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Build AppBundle
        if: hashFiles('build/app/outputs/flutter-apk/app-release.apk') != ''
        run: flutter build appbundle --release 2>&1

      - name: Upload AppBundle
        if: hashFiles('build/app/outputs/bundle/release/app-release.aab') != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

  create_release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build_android
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          find artifacts -type f -ls 2>/dev/null || echo "No artifacts found"
          echo "Artifact files found:"
          find artifacts -type f 2>/dev/null | wc -l

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Release v${{ github.run_number }}
            Automated build from main branch.
          files: artifacts/**/*
          fail_on_unmatched_files: false

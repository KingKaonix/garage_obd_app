name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses 2>&1 || true

      - name: Get dependencies
        run: flutter pub get 2>&1

      - name: Build debug APK
        id: build
        continue-on-error: true
        run: |
          flutter build apk --debug --verbose 2>&1

      - name: Collect debug info
        if: always()
        run: |
          mkdir -p /tmp/debug
          # Save step output to GDStep output
          find build -name "*.apk" 2>/dev/null > /tmp/debug/apk-files.txt
          find build -path "*/reports/*" -name "*.html" 2>/dev/null > /tmp/debug/reports.txt
          find build -name "*.log" 2>/dev/null > /tmp/debug/log-files.txt
          cat /tmp/debug/apk-files.txt
          cat /tmp/debug/reports.txt
          cat /tmp/debug/log-files.txt
          ls -la build/app/outputs/ 2>/dev/null || echo "No build output"

      - name: Upload debug bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: |
            build/app/outputs/flutter-apk/
            build/app/reports/
          retention-days: 90
          if-no-files-found: ignore

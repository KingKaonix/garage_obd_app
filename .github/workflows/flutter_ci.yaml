name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses 2>&1 || true

      - name: Get dependencies
        run: flutter pub get 2>&1

      - name: Build APK
        run: flutter build apk --debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: garage-obd-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90

      - name: Release APK build
        continue-on-error: true
        run: flutter build apk --release 2>&1 || true

      - name: Upload Release APK
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: garage-obd-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

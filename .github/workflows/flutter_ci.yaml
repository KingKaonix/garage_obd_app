name: Flutter CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - run: yes | flutter doctor --android-licenses || true
      - run: |
          flutter pub get
          flutter build apk --debug
      - name: Collect APK
        run: |
          mkdir -p /tmp/out
          find . -name "*.apk" -exec cp {} /tmp/out/ \;
          find / -name "*.apk" -exec cp {} /tmp/out/ \; 2>/dev/null || true
          ls -la /tmp/out/
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: /tmp/out/
          retention-days: 90
          if-no-files-found: error

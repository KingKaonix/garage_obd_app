name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v 2>&1

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses 2>&1 || true

      - name: Get dependencies
        run: flutter pub get 2>&1

      - name: Analyze
        run: flutter analyze 2>&1 || true

      - name: Build APK (debug with verbose)
        id: build_apk
        run: |
          flutter build apk --debug --verbose 2>&1
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90
        continue-on-error: true

      - name: Build failure inspection
        if: steps.build_apk.outcome != 'success'
        run: |
          echo "=== BUILD FAILED - Collecting diagnostics ==="
          echo ""
          echo "--- Last 100 lines of the build log ---"
          find build -name "*.log" -exec tail -100 {} \; 2>/dev/null || echo "No build logs"
          echo ""
          echo "--- Check if Gradle reports exist ---"
          find . -path "*/reports/*" -name "*.html" 2>/dev/null | head -5
        shell: bash

      - name: Try release build
        id: build_apk_release
        run: |
          flutter build apk --release --verbose 2>&1
        continue-on-error: true

      - name: Upload Release APK
        if: steps.build_apk_release.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Build AppBundle
        if: steps.build_apk_release.outcome == 'success'
        run: flutter build appbundle --release --verbose 2>&1

      - name: Upload AppBundle
        if: steps.build_apk_release.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

  create_release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build_android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Automated Release v${{ github.run_number }}
            Latest code from main branch.
          files: |
            artifacts/app-release-apk/app-release.apk
            artifacts/app-release-aab/app-release.aab
          fail_on_unmatched_files: false

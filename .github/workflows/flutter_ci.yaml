name: Flutter CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - run: |
          flutter --version
          yes | flutter doctor --android-licenses || true
      - name: Pub get verbose
        continue-on-error: true
        run: flutter pub get --verbose 2>&1
      - name: Build
        continue-on-error: true
        run: flutter build apk --debug 2>&1
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: '**/*.apk'
          retention-days: 90
          if-no-files-found: ignore

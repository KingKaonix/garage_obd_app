name: Flutter CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Prep
        run: |
          yes | flutter doctor --android-licenses 2>&1 || true
          flutter pub get 2>&1

      - name: Build APK
        id: build
        continue-on-error: true
        run: |
          flutter build apk --debug 2>&1
          echo "status=$?" >> $GITHUB_OUTPUT

      - name: Show files
        if: always()
        run: |
          set +e
          find /home/runner/work -name "*.apk" 2>/dev/null | head -5
          find . -name "*.apk" 2>/dev/null | head -5
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "NO APK DIR"
          ls -la build/ 2>/dev/null | head -5 || echo "NO BUILD DIR"
          echo "=== Workspace root ==="
          ls -la $GITHUB_WORKSPACE/ 2>/dev/null | head -10

      - name: Upload any APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: '**/*.apk'
          retention-days: 90
          if-no-files-found: ignore

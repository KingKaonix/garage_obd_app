name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Debug - Java version
        run: |
          echo "=== Java Version ==="
          java -version 2>&1
          echo "=== Java Home ==="
          echo $JAVA_HOME

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Debug - Flutter version & doctor
        run: |
          echo "=== Flutter Version ==="
          flutter --version 2>&1
          echo ""
          echo "=== Flutter Doctor (verbose) ==="
          flutter doctor -v 2>&1

      - name: Debug - Android SDK Environment
        run: |
          echo "=== Android SDK Root ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo ""
          echo "=== ANDROID_SDK_ROOT contents ==="
          ls -la $ANDROID_SDK_ROOT 2>&1 || echo "ANDROID_SDK_ROOT not found"
          echo ""
          echo "=== Platform Tools ==="
          ls -la $ANDROID_SDK_ROOT/platform-tools/ 2>&1 || echo "No platform-tools"
          echo ""
          echo "=== Platform SDKs ==="
          ls -la $ANDROID_SDK_ROOT/platforms/ 2>&1 || echo "No platforms dir"
          echo ""
          echo "=== Build Tools ==="
          ls -la $ANDROID_SDK_ROOT/build-tools/ 2>&1 || echo "No build-tools dir"
          echo ""
          echo "=== Cmdline Tools ==="
          ls -la $ANDROID_SDK_ROOT/cmdline-tools/ 2>&1 || echo "No cmdline-tools dir"

      - name: Accept Android SDK licenses
        run: |
          yes | flutter doctor --android-licenses 2>&1 || true

      - name: Debug - Flutter doctor after licenses
        run: flutter doctor -v 2>&1

      - name: Get Flutter dependencies
        run: |
          flutter pub get 2>&1
          echo "=== Dependencies ==="
          flutter pub deps 2>&1

      - name: Analyze Dart code
        run: flutter analyze 2>&1

      - name: Build Android APK (debug)
        id: build_apk_debug
        run: |
          echo "=== Building Debug APK ==="
          flutter build apk --debug 2>&1
          echo ""
          echo "=== Build artifacts ==="
          find build -name "*.apk" -type f 2>/dev/null

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90

      - name: Build Android APK (release)
        id: build_apk_release
        continue-on-error: true
        run: |
          echo "=== Building Release APK ==="
          flutter build apk --release 2>&1
          echo ""
          echo "=== Build artifacts ==="
          find build -name "*.apk" -type f 2>/dev/null

      - name: Debug - Release build failure inspection
        if: steps.build_apk_release.outcome != 'success'
        run: |
          echo "=== Release Build Failed ==="
          echo "--- Gradle build reports ---"
          find . -path "*/build/reports" -type d 2>/dev/null | head -10
          find . -name "*.html" -path "*/reports/*" 2>/dev/null | head -10
          echo ""
          echo "--- Flutter build logs ---"
          find /home/runner -name "flutter_build.log" 2>/dev/null | head -5
          find /home/runner -name "*.log" -path "*flutter*" 2>/dev/null | head -5
          echo ""
          echo "--- Gradle daemon logs ---"
          ls ~/.gradle/daemon/ 2>/dev/null || echo "No gradle daemon"
          echo ""
          echo "--- build/app directory contents ---"
          find build/app -type f -name "*.log" -o -name "*.txt" 2>/dev/null | head -20
          echo ""
          echo "--- android directory gradle files ---"
          find android -name "*.gradle*" -type f 2>/dev/null
          echo ""
          echo "--- gradle.properties ---"
          cat android/gradle.properties 2>/dev/null || echo "no gradle.properties"
          echo ""
          echo "--- gradle-wrapper.properties ---"
          cat android/gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "no wrapper"
          echo ""
          echo "--- app build.gradle (full) ---"
          cat android/app/build.gradle.kts
          echo ""
          echo "--- Flutter version channel info ---"
          flutter channel 2>&1 || true
          flutter --version 2>&1

      - name: Upload Release APK (if built)
        if: steps.build_apk_release.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

  create_release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build_android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug - Artifacts downloaded
        run: find artifacts -type f -ls 2>/dev/null || echo "No artifacts found"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Automated Release v${{ github.run_number }}

            This is an automated release generated from the CI/CD pipeline.

            **Changes:**
            - Latest code from main branch.
          files: |
            artifacts/app-release-apk/app-release.apk
            artifacts/app-release-aab/app-release.aab
          fail_on_unmatched_files: false

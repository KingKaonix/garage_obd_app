name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses 2>&1 || true

      - name: Get dependencies
        run: flutter pub get 2>&1

      - name: Build debug APK
        run: |
          flutter build apk --debug 2>&1
          echo "exit_code=$?" >> $GITHUB_ENV
        shell: bash

      - name: Debug - Print gradle daemon logs
        if: failure()
        run: |
          find ~/.gradle -name "*.log" 2>/dev/null | head -5
          find . -path "*/build/reports" -type d 2>/dev/null | head -5
          find . -name "*.html" -path "*/reports/*" 2>/dev/null
          cat ~/.gradle/daemon/*/daemon-*.log 2>/dev/null | tail -100 || true

      - name: Build release APK
        if: success()
        continue-on-error: true
        run: flutter build apk --release 2>&1 || true

      - name: Upload APKs and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garage-obd-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          retention-days: 90
          if-no-files-found: ignore

name: Flutter CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build debug APK
        continue-on-error: true
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Find APKs
        if: always()
        run: |
          echo "=== Looking for APKs ==="
          find / -name "*.apk" -type f 2>/dev/null | head -20
          echo "=== Build output ==="
          find . -path "*/flutter-apk/*" -type f 2>/dev/null | head -20
          echo "=== Build dir ==="
          ls -la build/ 2>/dev/null || echo "No build dir"
          ls -la build/app/ 2>/dev/null || echo "No build/app dir"
          ls -la build/app/outputs/ 2>/dev/null || echo "No build/app/outputs"

      - name: Upload workspace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-tree
          path: build/app/outputs/
          retention-days: 90
          if-no-files-found: warn

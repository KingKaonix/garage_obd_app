name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version & doctor
        run: |
          flutter --version
          flutter doctor -v
          echo "flutter.sdk=$(which flutter | xargs dirname | xargs dirname)" > android/local.properties
          cat android/local.properties

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses 2>&1 || true

      - name: Get dependencies
        run: flutter pub get 2>&1

      - name: Build debug APK
        id: build
        run: |
          flutter build apk --debug 2>&1
        shell: bash

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: garage-obd-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90
          if-no-files-found: error

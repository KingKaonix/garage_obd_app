name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses 2>&1 || true

      - name: Get dependencies
        run: flutter pub get 2>&1

      - name: Build debug APK
        id: build
        run: |
          set -o pipefail
          flutter build apk --debug 2>&1 | tee /tmp/build.log
        shell: bash

      - name: Save build log
        if: always()
        run: |
          mkdir -p /tmp/artifacts
          cp /tmp/build.log /tmp/artifacts/build.log 2>/dev/null || echo "No build log"
          ls -la /tmp/artifacts/

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: /tmp/artifacts/
          retention-days: 90
          if-no-files-found: warn

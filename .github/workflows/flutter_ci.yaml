# ─────────────────────────────────────────────────────────────────────────────
# Garage OBD App — Flutter CI/CD Pipeline
# Builds, analyzes, tests, and publishes debug APK artifacts.
# ─────────────────────────────────────────────────────────────────────────────
name: Garage OBD CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type of build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - profile
          - release

permissions:
  contents: write
  actions: read

env:
  FLUTTER_CHANNEL: stable
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'zulu'
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=false

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # ANALYZE — static analysis, dependency verification, lint checks
  # ═══════════════════════════════════════════════════════════════════════════
  analyze:
    name: Analyze 🧪
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # ── Setup ──
      - name: ⏱ Workflow started
        run: echo "TIMESTAMP_START=$(date -u +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      # ── Environment Diagnostics ──
      - name: 🖥 System Info
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          SYSTEM INFORMATION                  │"
          echo "└─────────────────────────────────────────────┘"
          echo "KERNEL   : $(uname -a)"
          echo "OS       : $(cat /etc/os-release 2>/dev/null | head -3 | tr '\n' ' ')"
          echo "ARCH     : $(uname -m)"
          echo "CPU      : $(nproc) cores"
          echo "MEMORY   : $(free -m | grep Mem | awk '{print $2}') MB"
          echo "SHELL    : $SHELL"
          echo "TIMESTAMP: $(date -u)"
          echo ""

      - name: 📦 Flutter + Dart Toolchain
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          FLUTTER/DART TOOLCHAIN              │"
          echo "└─────────────────────────────────────────────┘"
          flutter --version
          echo ""
          dart --version
          echo ""
          echo "Flutter channels available:"
          flutter channel 2>&1 || true
          echo ""
          echo "Dart SDK location: $(which dart)"
          echo "Flutter SDK location: $(which flutter)"

      - name: ☕ Java & Gradle Diagnostics
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          JAVA / GRADLE                       │"
          echo "└─────────────────────────────────────────────┘"
          java -version 2>&1 || true
          echo ""
          javac -version 2>&1 || true
          echo ""
          echo "JAVA_HOME: $JAVA_HOME"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo ""
          if [ -n "$ANDROID_HOME" ]; then
            echo "Android SDK tools:"
            ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "  No platforms dir"
            ls -la "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "  No build-tools dir"
          fi
          echo ""
          echo "Gradle version (if available):"
          gradle --version 2>/dev/null || echo "  Gradle not globally installed"

      - name: 📋 Flutter Doctor (Full)
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          FLUTTER DOCTOR (VERBOSE)            │"
          echo "└─────────────────────────────────────────────┘"
          flutter doctor --verbose 2>&1 || true

      # ── Dependency Resolution ──
      - name: 📥 Resolve Dependencies
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          DEPENDENCY RESOLUTION               │"
          echo "└─────────────────────────────────────────────┘"
          echo "--- pubspec.yaml ---"
          cat pubspec.yaml
          echo ""
          echo "--- flutter pub get (verbose) ---"
          flutter pub get --verbose 2>&1
          echo ""
          echo "--- Dependency Tree ---"
          if [ -f pubspec.lock ]; then
            grep -E "^\s+name:|^\s+version:" pubspec.lock | paste - - | column -t
          else
            echo "No pubspec.lock found"
          fi
          echo ""
          echo "--- Outdated Packages ---"
          flutter pub outdated 2>&1 || true

      # ── Patch flutter_bluetooth_serial for AGP 9+ compatibility ──
      - name: 🔧 Patch flutter_bluetooth_serial (jcenter → mavenCentral + namespace)
        run: |
          PACKAGE_DIR="$HOME/.pub-cache/hosted/pub.dev/flutter_bluetooth_serial-0.4.0"
          BUILD_GRADLE="$PACKAGE_DIR/android/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            echo "Patching flutter_bluetooth_serial build.gradle for AGP 9+..."
            # Replace jcenter with mavenCentral
            sed -i 's/jcenter()/mavenCentral()/g' "$BUILD_GRADLE"
            # Add namespace if not present (required by AGP 9+)
            if ! grep -q "namespace " "$BUILD_GRADLE"; then
              sed -i '/^android {/a\\    namespace "io.github.edufolly.flutterbluetoothserial"' "$BUILD_GRADLE"
            fi
            # Update compileSdkVersion for AGP 9+ (must be >=34)
            sed -i 's/compileSdkVersion 30/compileSdkVersion 35/g' "$BUILD_GRADLE"
            echo "✅ Patched"
          else
            echo "⚠️  Build gradle not found at $BUILD_GRADLE"
            find "$HOME/.pub-cache/hosted/pub.dev/" -path "*/flutter_bluetooth_serial*/android/build.gradle" 2>/dev/null
          fi

      # ── Static Analysis ──
      - name: 🔍 Static Analysis
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          DART ANALYSIS                       │"
          echo "└─────────────────────────────────────────────┘"
          # Run on all source directories
          for dir in lib test; do
            if [ -d "$dir" ]; then
              echo "── Analyzing $dir/ ──"
              dart analyze "$dir/" 2>&1
              EXITCODE=$?
              if [ $EXITCODE -gt 2 ]; then
                echo "❌ Analysis failed (exit code $EXITCODE)"
                exit $EXITCODE
              elif [ $EXITCODE -eq 2 ]; then
                echo "⚠️  Warnings found (exit code 2)"
              else
                echo "✅ Clean (exit code 0)"
              fi
              echo ""
            fi
          done
      - name: 🧩 Kernel Compilation Check
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          KERNEL COMPILATION TEST             │"
          echo "└─────────────────────────────────────────────┘"
          dart compile kernel lib/main.dart 2>&1 || echo "Kernel compilation check completed (non-fatal)"

      # ── File Structure Audit ──
      - name: 📁 Project Structure Audit
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          PROJECT STRUCTURE                   │"
          echo "└─────────────────────────────────────────────┘"
          echo "Source files:"
          find lib -name "*.dart" -type f | sort
          echo ""
          echo "Total Dart files: $(find lib -name '*.dart' | wc -l)"
          echo "Total lines of Dart code: $(find lib -name '*.dart' -exec cat {} + | wc -l)"
          echo ""
          echo "Android config files:"
          find android -name "*.xml" -o -name "*.gradle*" -o -name "*.kt" -o -name "*.kts" 2>/dev/null | sort
          echo ""
          echo "CI/CD config:"
          cat .github/workflows/flutter_ci.yaml | head -5
          echo "... ($(wc -l < .github/workflows/flutter_ci.yaml) lines total)"

      # ── Summary ──
      - name: ⏱ Analysis Complete
        run: |
          END_TIME=$(date -u +%s)
          START_TIME=${{ env.TIMESTAMP_START }}
          DURATION=$((END_TIME - START_TIME))
          echo "┌─────────────────────────────────────────────┐"
          echo "│          ANALYSIS COMPLETE                   │"
          echo "└─────────────────────────────────────────────┘"
          echo "Duration: $((DURATION / 60))m $((DURATION % 60))s"
          echo "Status: ✅ PASSED"

  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD — Compile Android APK(s) with comprehensive diagnostics
  # ═══════════════════════════════════════════════════════════════════════════
  build_android:
    name: Build APK 📦
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 60
    strategy:
      matrix:
        channel: [stable]
        build_mode: [debug]
      fail-fast: false
    steps:
      - name: ⏱ Build started
        run: echo "BUILD_START=$(date -u +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.channel }}
          cache: true

      # ── Licensing ──
      - name: 📜 Accept Android Licenses
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          ANDROID SDK LICENSES                │"
          echo "└─────────────────────────────────────────────┘"
          yes | flutter doctor --android-licenses 2>&1 || true
          echo ""
          echo "Post-license doctor:"
          flutter doctor --verbose 2>&1

      # ── Dependencies ──
      - name: 📥 Install Dependencies
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          INSTALL DEPENDENCIES                │"
          echo "└─────────────────────────────────────────────┘"
          flutter pub get --verbose 2>&1
          echo ""
          echo "--- Lockfile ---"
          if [ -f pubspec.lock ]; then
            grep -E "^\s+name:|^\s+version:" pubspec.lock | paste - - | column -t
          fi

      # ── Patch flutter_bluetooth_serial for AGP 9+ compatibility ──
      - name: 🔧 Patch flutter_bluetooth_serial (jcenter → mavenCentral + namespace + AGP compat)
        run: |
          echo "Searching for flutter_bluetooth_serial build.gradle..."
          PACKAGE_DIR=$(find "$HOME/.pub-cache/hosted/pub.dev/" -maxdepth 1 -type d -name "flutter_bluetooth_serial-*" 2>/dev/null | head -1)
          if [ -z "$PACKAGE_DIR" ]; then
            # Try alternate location
            PACKAGE_DIR=$(find "$HOME/.pub-cache/" -path "*/flutter_bluetooth_serial-*/android" -type d 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
          fi
          echo "Package dir: $PACKAGE_DIR"
          
          if [ -n "$PACKAGE_DIR" ]; then
            BUILD_GRADLE="$PACKAGE_DIR/android/build.gradle"
            if [ -f "$BUILD_GRADLE" ]; then
              echo "Found build.gradle at: $BUILD_GRADLE"
              echo "Contents BEFORE patching:"
              head -30 "$BUILD_GRADLE"
              echo ""
              echo "--- Patching ---"
              # jcenter → mavenCentral
              sed -i 's|jcenter()|mavenCentral()|g' "$BUILD_GRADLE"
              # Add namespace if missing (required by AGP 8+)
              if ! grep -q "namespace " "$BUILD_GRADLE" 2>/dev/null; then
                sed -i 's/^android {/android {\n    namespace "io.github.edufolly.flutterbluetoothserial"/' "$BUILD_GRADLE"
              fi
              # compileSdkVersion must be >= 34 for AGP 9+
              sed -i 's/compileSdkVersion [0-9][0-9]/compileSdkVersion 35/g' "$BUILD_GRADLE"
              # Update AGP in plugin (old plugin uses 4.1.0 which is incompatible with AGP 9)
              sed -i 's|classpath .com.android.tools.build:gradle:4.1.0.|classpath "com.android.tools.build:gradle:8.7.3"|g' "$BUILD_GRADLE"
              echo ""
              echo "Contents AFTER patching:"
              head -30 "$BUILD_GRADLE"
              echo ""
              echo "✅ Patched successfully"
            else
              echo "⚠️  build.gradle not found at $BUILD_GRADLE"
              find "$PACKAGE_DIR" -name "*.gradle" -type f 2>/dev/null
            fi
          else
            echo "⚠️  Could not find flutter_bluetooth_serial package"
            echo "Listing pub cache:"
            ls -la "$HOME/.pub-cache/hosted/pub.dev/" 2>/dev/null | head -20
          fi

      # ── Android SDK Debug ──
      - name: 🔧 Android SDK Configuration
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          ANDROID SDK DEBUG                   │"
          echo "└─────────────────────────────────────────────┘"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo ""
          echo "Platforms installed:"
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "  NONE"
          echo ""
          echo "Build tools installed:"
          ls -la "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "  NONE"
          echo ""
          echo "SDK manager list (partial):"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list 2>/dev/null | head -30 || echo "  sdkmanager not found"
          echo ""
          echo "local.properties:"
          cat android/local.properties 2>/dev/null || echo "  No local.properties"
          echo ""
          echo "Android Manifest:"
          find android -name "AndroidManifest.xml" -exec echo "--- {} ---" \; -exec cat {} \;

      # ── Gradle Configuration ──
      - name: 📐 Gradle Configuration Audit
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          GRADLE CONFIGURATION                │"
          echo "└─────────────────────────────────────────────┘"
          echo "settings.gradle.kts:"
          cat android/settings.gradle.kts 2>/dev/null || echo "  Not found"
          echo ""
          echo "build.gradle.kts (root):"
          cat android/build.gradle.kts 2>/dev/null || echo "  Not found"
          echo ""
          echo "build.gradle.kts (app):"
          cat android/app/build.gradle.kts 2>/dev/null || echo "  Not found"

      # ── Pre-build Verification ──
      - name: ✅ Pre-build Verification
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          PRE-BUILD VERIFICATION              │"
          echo "└─────────────────────────────────────────────┘"
          flutter analyze 2>&1 || true
          echo ""
          echo "Checking for Flutter cache issues..."
          flutter clean 2>&1 || true
          echo ""
          echo "Re-resolving dependencies after clean..."
          flutter pub get 2>&1

      # ── Build ──
      - name: 🏗 Build APK
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          BUILDING APK                        │"
          echo "│  Mode: ${{ matrix.build_mode }}                     │"
          echo "│  Channel: ${{ matrix.channel }}                    │"
          echo "└─────────────────────────────────────────────┘"
          
          BUILD_START=$(date -u +%s)
          
          flutter build apk --${{ matrix.build_mode }} --verbose 2>&1
          BUILD_EXIT=$?
          
          BUILD_END=$(date -u +%s)
          BUILD_DURATION=$((BUILD_END - BUILD_START))
          
          echo ""
          echo "Build duration: $((BUILD_DURATION / 60))m $((BUILD_DURATION % 60))s"
          echo "Build exit code: $BUILD_EXIT"
          
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "❌ BUILD FAILED"
            exit $BUILD_EXIT
          fi
          echo "✅ BUILD SUCCEEDED"

      # ── APK Discovery & Diagnostics ──
      - name: 🔍 APK Discovery
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          APK OUTPUT DIAGNOSTICS              │"
          echo "└─────────────────────────────────────────────┘"
          echo "Searching for APK files..."
          echo ""
          echo "--- All APKs in workspace ---"
          find . -name "*.apk" -type f -ls 2>/dev/null
          echo ""
          echo "--- Standard output dir ---"
          STANDARD_DIR="build/app/outputs/flutter-apk/"
          if [ -d "$STANDARD_DIR" ]; then
            ls -la "$STANDARD_DIR"
            echo ""
            echo "APK details:"
            for apk in "$STANDARD_DIR"*.apk; do
              if [ -f "$apk" ]; then
                echo "  File: $(basename $apk)"
                echo "  Size: $(du -h "$apk" | cut -f1)"
                echo "  Modified: $(stat -c '%y' "$apk")"
                echo "  ---"
              fi
            done
          else
            echo "Standard APK output directory not found"
            echo "Searching more broadly..."
            find . -path "*/build/*" -name "*.apk" -type f 2>/dev/null
          fi
          echo ""
          echo "--- Build output tree ---"
          find build -type f -name "*.apk" -o -name "*.aab" -o -name "*.mapping" 2>/dev/null | head -20

      # ── APK Signature Check (debug APK) ──
      - name: 🔏 APK Signature Info
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          APK SIGNATURE VERIFICATION          │"
          echo "└─────────────────────────────────────────────┘"
          APK=$(find . -name "app-debug.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ] && command -v keytool &>/dev/null; then
            echo "Checking APK: $APK"
            unzip -p "$APK" META-INF/*.RSA 2>/dev/null | keytool -printcert 2>/dev/null || echo "  Could not extract cert (debug key expected)"
            echo ""
            echo "APK contents (size):"
            unzip -l "$APK" 2>/dev/null | tail -5
          else
            echo "APK not found or keytool not available"
          fi

      # ── Upload Artifact ──
      - name: ☁️ Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: garage-obd-app-${{ matrix.build_mode }}-${{ matrix.channel }}
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/flutter-apk/*.aab
          retention-days: 90
          if-no-files-found: warn
          compression-level: 0

      # ── Summary ──
      - name: 📊 Build Summary
        run: |
          END_TIME=$(date -u +%s)
          START_TIME=${{ env.BUILD_START }}
          DURATION=$((END_TIME - START_TIME))
          echo "┌─────────────────────────────────────────────┐"
          echo "│          BUILD SUMMARY                       │"
          echo "└─────────────────────────────────────────────┘"
          echo "Duration  : $((DURATION / 60))m $((DURATION % 60))s"
          echo "Mode      : ${{ matrix.build_mode }}"
          echo "Channel   : ${{ matrix.channel }}"
          echo "Timestamp : $(date -u)"
          echo ""
          echo "APK Artifacts:"
          find . -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null
          echo ""
          echo "✅ Build Job Complete"

  # ═══════════════════════════════════════════════════════════════════════════
  # NOTIFY — Optional notification on completion
  # ═══════════════════════════════════════════════════════════════════════════
  notify:
    name: Notify 📬
    runs-on: ubuntu-latest
    needs: [analyze, build_android]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 📨 Build Status Report
        run: |
          echo "┌─────────────────────────────────────────────┐"
          echo "│          CI/CD SUMMARY                       │"
          echo "└─────────────────────────────────────────────┘"
          echo "Repository: ${{ github.repository }}"
          echo "Branch    : ${{ github.ref_name }}"
          echo "Commit    : ${{ github.sha }}"
          echo "Run       : ${{ github.run_id }}"
          echo "Status    : ${{ needs.analyze.result == 'success' && needs.build_android.result == 'success' && '✅ ALL PASSED' || '❌ SOME FAILED' }}"
          echo ""
          echo "Analyze   : ${{ needs.analyze.result }}"
          echo "Build     : ${{ needs.build_android.result }}"
          echo ""
          echo "APK available at:"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses 2>&1 || true

      - name: Get dependencies
        run: flutter pub get 2>&1

      - name: Analyze
        run: flutter analyze 2>&1 || true

      - name: Build APK (debug)
        run: flutter build apk --debug 2>&1

      - name: Build APK (release)
        continue-on-error: true
        run: flutter build apk --release 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: garage-obd-apk
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          name: Build ${{ github.run_id }}
          tag: build-${{ github.run_id }}
          artifacts: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app.apk
          artifactContentType: application/vnd.android.package-archive
          omitBodyDuringUpdate: true
          body: |
            ## Garage OBD App - Build ${{ github.run_id }}

            Automated build from `main` branch.
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true

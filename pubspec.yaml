name: garage_obd_app
description: "Garage OBD App - OBD-II car diagnostic tool"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^2.3.9
  sqflite: ^2.4.3
  path_provider: ^2.1.6
  fl_chart: ^1.2.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  flutter_blue_plus_linux:
    path: ./stub_linux
  flutter_blue_plus_darwin:
    path: ./stub_darwin
  path_provider_foundation:
    path: ./stub_path_provider_foundation

flutter:
  uses-material-design: true
